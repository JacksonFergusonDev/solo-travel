<div
    style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; width: 250px; color: #a9b7d0;">
    <h5 style="margin:0 0 4px 0; color:#22d3ee; font-weight:600;">Step ${step_number}: ${loc_string}</h5>
    <span style="font-size:0.85em; color:#6b7c9f;">${start_str} &bull; (${duration} Days)</span>
    <hr style="margin: 8px 0; border:0; border-top: 1px solid rgba(34, 211, 238, 0.14);">

    <div style="margin-bottom: 6px;">
        <span
            style="font-size:0.75em; text-transform:uppercase; color:#22d3ee; opacity: 0.8; font-weight:bold; display:block;">Inbound
            Movement</span>
        <span style="font-size:0.9em; font-weight:500; color: #ffffff;">${transit_info}${arr_time}</span>
    </div>

    <div>
        <span
            style="font-size:0.75em; text-transform:uppercase; color:#22d3ee; opacity: 0.8; font-weight:bold; display:block;">Lodging
            Entry</span>
        <span style="font-size:0.9em; font-weight:500; display:block; color: #ffffff;">${hostel}</span>
        <span style="font-size:0.8em; display:block; margin-top:2px;">📍 ${address}</span>
        <span style="font-size:0.8em; display:block;">📞 ${contact}</span>
        <span style="font-size:0.8em; font-weight:500; color:#22d3ee; margin-top:4px; display:block;">Check-in:
            ${check_in}</span>
    </div>
    ${targeted_events_html}
</div>
